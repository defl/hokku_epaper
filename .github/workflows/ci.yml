name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e "webserver/[test]"

      - name: Run tests
        run: pytest -m "not time_intensive"

  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32s3
          path: firmware
          command: bash ci-build.sh

      - uses: actions/upload-artifact@v7
        with:
          name: hokku-firmware
          path: firmware/release/hokku-firmware_*.bin

  build-deb:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper dh-python python3-setuptools pybuild-plugin-pyproject

      - name: Build .deb
        working-directory: webserver
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p build
          mv hokku-server_*.deb hokku-server_*.buildinfo hokku-server_*.changes build/

      - uses: actions/upload-artifact@v7
        with:
          name: hokku-server-deb
          path: build/hokku-server_*.deb
